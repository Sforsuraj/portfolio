<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suraj Kumar // Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="dot-grid"></div>

    {% block nav %}
    <header class="nav">
        <div class="nav-inner">
            <div class="nav-left">
                <span class="nav-logo-indicator"></span>
                <span class="nav-logo-text">
                    <span class="nav-logo-main">SK</span><span class="nav-logo-sub">.DEV</span>
                </span>
            </div>
            <nav class="nav-center">
                <a href="#home" class="nav-link active" data-target="home">HOME</a>
                <a href="#about" class="nav-link" data-target="about">ABOUT</a>
                <a href="#projects" class="nav-link" data-target="projects">PROJECTS</a>
                <a href="#skills" class="nav-link" data-target="skills">SKILLS</a>
                <a href="#experience" class="nav-link" data-target="experience">EXPERIENCE</a>
                <a href="#contact" class="nav-link" data-target="contact">CONTACT</a>
            </nav>
            <div class="nav-right">
                <div class="nav-status">
                    <span class="status-dot"></span>
                    <span class="status-text">ONLINE</span>
                </div>
                <a href="#contact" class="btn btn-outline nav-cta">CONTACT ME</a>
                <button class="nav-hamburger" aria-label="Open navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
        <div class="nav-mobile-overlay">
            <div class="nav-mobile-inner">
                <a href="#home" class="nav-mobile-link" data-target="home">HOME</a>
                <a href="#about" class="nav-mobile-link" data-target="about">ABOUT</a>
                <a href="#projects" class="nav-mobile-link" data-target="projects">PROJECTS</a>
                <a href="#skills" class="nav-mobile-link" data-target="skills">SKILLS</a>
                <a href="#experience" class="nav-mobile-link" data-target="experience">EXPERIENCE</a>
                <a href="#contact" class="nav-mobile-link" data-target="contact">CONTACT</a>
            </div>
        </div>
    </header>
    {% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    <footer class="footer">
        <div class="container footer-inner">
            <span class="footer-text">© 2026 Suraj Kumar. All rights reserved.</span>
            <span class="footer-text-muted">// Built with Flask & JetBrains Mono</span>
        </div>
    </footer>
    {% endblock %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/terminal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/threejs-scenes.js') }}"></script>
</body>
</html>
